# Company Specific Architectural Rules
# Demonstrating the Specmatic Linter's DSL for custom assertions

rules:
  # Rule 1: Prohibit 'error' as a Parameter name
  # Uses a negative lookahead regex to allow anything EXCEPT the literal "error"
  rule/no-error-param:
    severity: error
    subject:
      type: Parameter
      property: name
    assertions:
      pattern: '^(?!error$).*$'
    message: "Architectural violation: Parameter names must not be 'error'."

  # Rule 2: Corporate Mandatory Parameter Description
  rule/parameter-description-required:
    severity: error
    subject:
      type: Parameter
    assertions:
      required:
        - description
    message: "Architectural violation: All parameters must have a description."

  # Rule 3: Force OIDC Authentication
  rule/force-oidc-auth:
    severity: error
    subject:
      type: SecurityScheme
      property: type
    assertions:
      const: openIdConnect
    message: "Architectural violation: Only OIDC authentication is permitted."
