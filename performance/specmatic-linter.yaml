rules:
  rule/parameter-name-defined:
    severity: error
    type: parameters
    on:
      type: Parameter
    must:
      required:
        - name

  rule/parameter-schema-defined:
    severity: error
    type: parameters
    on:
      type: Parameter
    must:
      required:
        - schema

  rule/security-scheme-supported:
    severity: warn
    type: security
    on:
      type: SecurityScheme
      property: type
    must:
      enum:
        - oauth2
        - http
        - apiKey

  rule/security-http-scheme-supported:
    severity: warn
    type: security
    on:
      type: SecurityScheme
      property: scheme
    when:
      - on:
          type: SecurityScheme
          property: type
        must:
          const: http
    must:
      enum:
        - bearer
        - basic

  rule/security-apikey-location-supported:
    severity: warn
    type: security
    on:
      type: SecurityScheme
      property: in
    when:
      - on:
          type: SecurityScheme
          property: type
        must:
          const: apiKey
    must:
      enum:
        - header
        - query

profiles:
  benchmark:
    rules:
      extends:
        - recommended
      include:
        - rule/parameter-name-defined
        - rule/parameter-schema-defined
        - rule/security-scheme-supported
        - rule/security-http-scheme-supported
        - rule/security-apikey-location-supported
      override:
        no-unresolved-refs: error
        path-parameters-defined: error
        no-required-schema-properties-undefined: warn
        invalid-operation-status: error
        invalid-additional-properties-usage: warn
        invalid-parameter-shape: error
        query-param-collision: error
        required-query-object-conflict: warn
        invalid-min-length: error
        invalid-max-length: error
        invalid-numeric-bounds: error
        length-exceeds-limit: warn
        pattern-length-incompatible: error
        accept-response-content-type-conflict: warn
        content-type-header-declared: warn
        content-type-header-overrides-media-type: warn
        security-property-redefined: warn
        security-scheme-missing: error
        ref-has-siblings: warn
        schema-unclear: warn
        missing-schema-fallback: error
        invalid-regex-format: error
        oas30-enum-null-coercion: error
        enum-nullability-coercion: error
        enum-value-schema-mismatch: error
        enum-no-matching-values: error
        get-request-body-disallowed: error
