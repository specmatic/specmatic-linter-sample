plugins:
  - ../js-plugin/index.js

extends:
  - recommended

categories:
  - schema

rules:
  no-required-schema-properties-undefined: error
  specmatic/missing-schema-fallback: 
    severity: error

  rule/parameter-description-required:
    severity: error
    category:
      - governance
    subject:
      type: Parameter
    assertions:
      required:
        - description
    message: 'Governance violation: every parameter must declare a description.'

  demo-categories/operation-risk-tier:
    severity: error
    category:
      - governance
