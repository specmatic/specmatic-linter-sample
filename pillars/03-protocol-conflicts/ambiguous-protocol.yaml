openapi: 3.0.3
info:
  title: HTTP Semantic Conflicts and Security Overlaps
  version: 1.0.0
security:
  - ApiKeyAuth: []
paths:
  /searches:
    get:
      summary: GET with request body
      parameters:
        - name: X-API-Key
          in: header
          description: "Shadows api-key security header"
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: OK

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
