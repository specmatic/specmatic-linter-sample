openapi: 3.0.3
info:
  title: Schema Composition Problems
  version: 1.0.0
paths:
  /schema-compositions:
    get:
      summary: Ref with sibling type
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefWithSiblings'

components:
  schemas:
    RefWithSiblings:
      $ref: '#/components/schemas/SimpleString'
      type: string
      description: "In OAS 3.0, sibling fields next to $ref are ignored"
    
    SimpleString:
      type: string
