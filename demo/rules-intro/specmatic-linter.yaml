plugins:
  - ./js-plugin/index.js

rules:
  rule/no-error-param:
    severity: error
    type: parameters
    on:
      type: Parameter
      property: name
    must:
      pattern: '^(?!error$).*$'
    message: "Architectural violation: Parameter names must not be 'error'."

  rule/parameter-description-required:
    severity: error
    type: parameters
    on:
      type: Parameter
    must:
      required:
        - description
    message: "Architectural violation: All parameters must have a description."

  rule/force-oidc-auth:
    severity: error
    type: security
    on:
      type: SecurityScheme
      property: type
    must:
      const: openIdConnect
    message: "Architectural violation: Only OIDC authentication is permitted."

  corp-standards/pagination-range:
    severity: error
    type: parameters

  corp-standards/operation-id-naming:
    severity: warn
    type: operations

profiles:
  default:
    rules:
      extends:
        - starter
      override:
        ref-has-siblings: error
        invalid-numeric-bounds: error
        pattern-length-incompatible: error
        security-property-redefined: error
        missing-schema-fallback: error
        get-request-body-disallowed: error

