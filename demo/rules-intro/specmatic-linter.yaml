plugins:
  - ./js-plugin/index.js

rules:
  rule/no-error-param:
    severity: error
    type: parameters
    subject:
      type: Parameter
      property: name
    assertions:
      pattern: '^(?!error$).*$'
    message: "Architectural violation: Parameter names must not be 'error'."

  rule/parameter-description-required:
    severity: error
    type: parameters
    subject:
      type: Parameter
    assertions:
      required:
        - description
    message: "Architectural violation: All parameters must have a description."

  rule/force-oidc-auth:
    severity: error
    type: security
    subject:
      type: SecurityScheme
      property: type
    assertions:
      const: openIdConnect
    message: "Architectural violation: Only OIDC authentication is permitted."

  corp-standards/pagination-range:
    severity: error
    type: parameters

  corp-standards/operation-id-naming:
    severity: warn
    type: operations

profiles:
  default:
    rules:
      extends:
        - minimal
      override:
        specmatic/ref-has-siblings: error
        specmatic/invalid-numeric-bounds: error
        specmatic/pattern-length-incompatible: error
        specmatic/security-property-redefined: error
        specmatic/missing-schema-fallback: error
        specmatic/get-request-body-disallowed: error

