plugins:
  - ./js-plugin/index.js

rules:
  rule/no-error-param:
    severity: error
    type: parameters
    subject:
      type: Parameter
      property: name
    assertions:
      pattern: '^(?!error$).*$'
    message: "Architectural violation: Parameter names must not be 'error'."

  rule/parameter-description-required:
    severity: error
    type: parameters
    subject:
      type: Parameter
    assertions:
      required:
        - description
    message: "Architectural violation: All parameters must have a description."

  rule/force-oidc-auth:
    severity: error
    type: security
    subject:
      type: SecurityScheme
      property: type
    assertions:
      const: openIdConnect
    message: "Architectural violation: Only OIDC authentication is permitted."

  corp-standards/pagination-range:
    severity: error
    type: parameters

  corp-standards/operation-id-naming:
    severity: warn
    type: operations

profiles:
  minimal-semantic:
    rules:
      extends:
        - minimal
      include:
        - no-enum-type-mismatch
        - specmatic/invalid-numeric-bounds
        - specmatic/pattern-length-incompatible
        - specmatic/security-property-redefined
        - specmatic/ref-has-siblings
        - specmatic/missing-schema-fallback
        - specmatic/get-request-body-disallowed

  recommended-semantic:
    rules:
      extends:
        - recommended
      override:
        specmatic/ref-has-siblings: error
        specmatic/invalid-numeric-bounds: error
        specmatic/pattern-length-incompatible: error
        specmatic/security-property-redefined: error
        specmatic/missing-schema-fallback: error
        specmatic/get-request-body-disallowed: error

  configurable-rules:
    rules:
      extends:
        - recommended
      include:
        - rule/no-error-param
        - rule/parameter-description-required
        - rule/force-oidc-auth
      override:
        specmatic/ref-has-siblings: warn

  js-rules:
    rules:
      extends:
        - recommended
      include:
        - corp-standards/pagination-range
        - corp-standards/operation-id-naming
