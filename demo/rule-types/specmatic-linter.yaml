rules:
  rule/parameter-description-required:
    severity: error
    type: parameters
    on:
      type: Parameter
    must:
      required:
        - description
    message: Every parameter must declare a description.

profiles:
  default:
#    types:
#      - examples
    rules:
      extends:
        - recommended
      include:
        - rule/parameter-description-required
      override:
        no-invalid-schema-examples: error
        no-enum-type-mismatch: error
        missing-schema-fallback: error
        invalid-numeric-bounds: error
        scalar-property-missing-example: warn
