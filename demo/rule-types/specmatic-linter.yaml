rules:
  rule/parameter-description-required:
    severity: error
    type: parameters
    subject:
      type: Parameter
    assertions:
      required:
        - description
    message: Every parameter must declare a description.

profiles:
  default:
    types:
      - schema
      - parameters
    rules:
      extends:
        - recommended
      include:
        - rule/parameter-description-required
      override:
        no-invalid-schema-examples: error
        no-enum-type-mismatch: error
        specmatic/missing-schema-fallback: error
        specmatic/invalid-numeric-bounds: error
